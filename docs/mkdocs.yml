site_name: lime-sites-sdk
site_description: Official Python SDK for LIME site backends — login requests, SSE, passport JWT.
site_url: https://lime-sites-sdk.readthedocs.io/
repo_url: https://github.com/Mawyxx/lime-site-sdk
docs_dir: .
site_dir: ../site
theme:
  name: material
  palette:
    - scheme: slate
      primary: amber
  features:
    - content.code.copy
    - navigation.tracking
    - toc.follow
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: false
            members_order: source
            group_by_category: false
            show_bases: false
            heading_level: 3
            line_length: 80
            filters: ["!^_", "!^__"]
nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - API Reference: api.md
  - Examples: examples.md
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
      toc_depth: 3
