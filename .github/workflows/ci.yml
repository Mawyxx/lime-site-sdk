name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (dev)
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        if: matrix.python-version == '3.12'
        run: mypy src/lime_sites

      - name: Pytest (100% coverage)
        if: matrix.python-version == '3.12'
        run: pytest --cov=lime_sites --cov-fail-under=100

      - name: Pytest
        if: matrix.python-version != '3.12'
        run: pytest

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and docs tools
        run: pip install -r docs/requirements.txt && pip install .
      - name: Build docs
        run: mkdocs build --strict -f docs/mkdocs.yml

  publish:
    needs: quality
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build hatchling

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          skip-existing: true
